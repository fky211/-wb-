<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 充电桩监控系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid #334155;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .logo p {
            color: #64748b;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #64748b;
            font-size: 16px;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .form-group input::placeholder {
            color: #475569;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }
        .message.success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }
        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #475569;
        }
        .hint span {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>⚡ 充电桩监控系统</h1>
                <p>新能源充电桩实时监控平台</p>
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="login">登录</div>
                <div class="tab" data-tab="register">注册</div>
            </div>

            <!-- 登录表单 -->
            <div class="form-panel active" id="loginPanel">
                <form id="loginForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">登 录</button>
                </form>
                <div class="message" id="loginMessage"></div>
                <div class="hint">默认账号: <span>admin</span> / <span>admin123</span></div>
            </div>

            <!-- 注册表单 -->
            <div class="form-panel" id="registerPanel">
                <form id="registerForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="regUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>昵称</label>
                        <input type="text" id="regNickname" placeholder="请输入昵称（可选）">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="regPassword" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="regPassword2" placeholder="请再次输入密码" required>
                    </div>
                    <button type="submit" class="submit-btn" id="registerBtn">注 册</button>
                </form>
                <div class="message" id="registerMessage"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // 标签切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
                hideMessages();
            });
        });

        // 隐藏所有消息
        function hideMessages() {
            document.querySelectorAll('.message').forEach(m => {
                m.style.display = 'none';
                m.textContent = '';
            });
        }

        // 显示消息
        function showMessage(id, text, isError) {
            const msg = document.getElementById(id);
            msg.textContent = text;
            msg.className = 'message ' + (isError ? 'error' : 'success');
            msg.style.display = 'block';
        }

        // 登录
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('loginMessage', '请输入用户名和密码', true);
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const resp = await fetch(`${API_BASE}/api/user/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                const data = await resp.json();

                if (data.code === 0) {
                    showMessage('loginMessage', '登录成功，正在跳转...', false);
                    // 保存用户信息到localStorage
                    localStorage.setItem('user', JSON.stringify(data.data));
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage('loginMessage', data.msg || '登录失败', true);
                }
            } catch (err) {
                showMessage('loginMessage', '网络错误，请检查服务器', true);
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });

        // 注册
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const username = document.getElementById('regUsername').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;

            if (!username || !password) {
                showMessage('registerMessage', '请输入用户名和密码', true);
                return;
            }

            if (password !== password2) {
                showMessage('registerMessage', '两次输入的密码不一致', true);
                return;
            }

            if (password.length < 6) {
                showMessage('registerMessage', '密码长度不能少于6位', true);
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                let url = `${API_BASE}/api/user/register?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
                if (nickname) {
                    url += `&nickname=${encodeURIComponent(nickname)}`;
                }

                const resp = await fetch(url);
                const data = await resp.json();

                if (data.code === 0) {
                    showMessage('registerMessage', '注册成功，请登录', false);
                    // 清空表单
                    document.getElementById('registerForm').reset();
                    // 切换到登录标签
                    setTimeout(() => {
                        document.querySelector('.tab[data-tab="login"]').click();
                        document.getElementById('loginUsername').value = username;
                    }, 1500);
                } else {
                    showMessage('registerMessage', data.msg || '注册失败', true);
                }
            } catch (err) {
                showMessage('registerMessage', '网络错误，请检查服务器', true);
            } finally {
                btn.disabled = false;
                btn.textContent = '注 册';
            }
        });

        // 检查是否已登录
        (async function checkLogin() {
            const user = localStorage.getItem('user');
            if (user) {
                try {
                    const resp = await fetch(`${API_BASE}/api/user/info`);
                    const data = await resp.json();
                    if (data.code === 0) {
                        window.location.href = '/';
                        return;
                    }
                } catch (err) {
                    // 忽略错误
                }
                localStorage.removeItem('user');
            }
        })();
    </script>
</body>
</html>
